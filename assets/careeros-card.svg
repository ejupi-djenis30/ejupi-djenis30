<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" role="img" aria-labelledby="title description">
  <title id="title">CareerOS Local</title>
  <desc id="description">A local-first career utility represented as verified records flowing into search, tasks and dossier outputs.</desc>
  <rect width="600" height="230" rx="18" fill="#101713" />
  <g opacity=".11" stroke="#b9fa7b">
    <path d="M0 46h600M0 92h600M0 138h600M0 184h600" />
    <path d="M60 0v230M120 0v230M180 0v230M240 0v230M300 0v230M360 0v230M420 0v230M480 0v230M540 0v230" />
  </g>
  <text x="34" y="45" fill="#b9fa7b" font-family="monospace" font-size="14" letter-spacing="2">01 / LOCAL-FIRST UTILITY</text>
  <text x="34" y="112" fill="#f5f5ed" font-family="Arial, sans-serif" font-size="42" font-weight="800">CareerOS Local</text>
  <text x="34" y="154" fill="#aeb8b0" font-family="Arial, sans-serif" font-size="18">Records → applications.</text>
  <g transform="translate(365 35)" font-family="monospace" font-size="9" text-anchor="middle">
