    <path d="M101 55v27M31 82h140" fill="none" stroke="#b9fa7b" />
    <path d="M31 82v17M101 82v17M171 82v17" fill="none" stroke="#b9fa7b" />
    <g transform="translate(0 99)">
      <rect width="62" height="52" rx="7" fill="#b9fa7b" />
      <rect x="70" width="62" height="52" rx="7" fill="#17211b" stroke="#b9fa7b" />
      <rect x="140" width="62" height="52" rx="7" fill="#b9fa7b" />
      <text x="31" y="24" fill="#101713">SEARCH</text>
      <text x="31" y="37" fill="#101713">PLAN</text>
      <text x="101" y="24" fill="#f5f5ed">TASKS</text>
