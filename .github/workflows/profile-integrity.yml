name: Profile integrity

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "assets/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/profile-integrity.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "assets/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/profile-integrity.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate README and SVG assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Test the validator
        run: node --test tests/*.test.mjs

      - name: Validate profile content
        run: node scripts/validate-profile.mjs
